<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Trips en El Salvador</h1>
        <table class="table table-hover"> <thead>
                <tr>
                    <td>Id</td>
                    <td>Nombre</td>
                    <td>Fecha publicacion</td>
                    <td>Costo</td>
                    <td>Descripcion</td>
                    <td>Destacado</td>
                </tr>
            </thead>
            <tbody>
                <tr th:each="trip : ${trips}"> <td th:text="${trip.id}"></td>
                    <td th:text="${trip.nombre}"></td>
                    <td th:text="${trip.fecha}"></td>
                    <td th:text="${trip.costo}"></td>
                    <td th:text="${trip.descripcion}"></td>
                    <td>
                        <span th:if="${trip.destacado == 1}" class="badge bg-success">Si</span>
                        <span th:unless="${trip.destacado == 1}" class="badge bg-danger">No</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
